---
- name: Tear down a Village Calendar PR preview
  hosts: k3s_cluster
  gather_facts: no
  become: no
  vars:
    k8s_namespace: "{{ lookup('env', 'DEPLOYMENT_NAMESPACE') }}"

  tasks:
    - name: Fail if namespace not provided
      fail:
        msg: "DEPLOYMENT_NAMESPACE env var is required"
      when: k8s_namespace | length == 0

    - name: Refuse to delete protected namespaces
      fail:
        msg: "Refusing to delete namespace {{ k8s_namespace }} — only calendar-pr-* namespaces may be torn down by this playbook"
      when: not (k8s_namespace is match('^calendar-pr-[0-9]+$'))

    - name: Locate kubectl
      shell: |
        if command -v kubectl &> /dev/null; then
          echo "kubectl"
        elif [ -f /usr/local/bin/kubectl ]; then
          echo "/usr/local/bin/kubectl"
        else
          echo "NONE"
        fi
      register: kubectl_cmd
      changed_when: false

    - name: Set kubectl command
      set_fact:
        kubectl: "{{ kubectl_cmd.stdout }}"

    - name: Delete namespace (cascades to all resources)
      shell: "{{ kubectl }} delete namespace {{ k8s_namespace }} --ignore-not-found=true --wait=false"
