name: Native Build (GraalVM)

# Builds the GraalVM native image via Dockerfile.native and pushes it to
# Docker Hub using the same `sha-<head>` tag scheme as the JVM CI workflow,
# so deploy-pr.yml can pick it up unchanged. The PR-preview namespace ends
# up running the actual native binary.
#
# Triggers on push to feature/native-build and on pull_request targeting
# feature/native-build, so PR #100 (which adds Dockerfile.native) fires
# this on its next sync. Also wired to workflow_dispatch for manual reruns.
#
# This workflow only operates on the native feature branch. Mainline
# main/beta still use ci.yml + JVM build.

on:
  push:
    branches:
      - feature/native-build
  pull_request:
    branches:
      - feature/native-build
  workflow_dispatch:

concurrency:
  group: native-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: village-calendar

jobs:
  native-image:
    name: Build & push native image
    runs-on: ubuntu-latest
    # Native compilation can take 15+ min on a hosted runner.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Dockerfile.native exists
        run: |
          if [ ! -f Dockerfile.native ]; then
            echo "::error::Dockerfile.native is missing on this ref. PR #100 (native/initial-pass) adds it; if you are on feature/native-build before that lands, this workflow fails by design."
            exit 1
          fi
          echo "Dockerfile.native size: $(wc -c < Dockerfile.native) bytes"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Free disk space on runner
        # GraalVM builds + Docker layers exhaust the default 14 GB.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract image metadata
        # Mirrors ci.yml's tagging scheme so deploy-pr.yml finds the image:
        #   - sha-<long-sha> (merge commit on PRs, pushed commit on push)
        #   - sha-<pr-head-sha> for PRs (deploy-pr.yml reads
        #     workflow_run.head_sha = PR branch HEAD)
        #   - native-latest tag on push events for ad-hoc pulls
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=sha-${{ github.event.pull_request.head.sha }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=native-latest,enable=${{ github.event_name == 'push' }}

      - name: Build & push native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.native
          platforms: linux/amd64
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "Pushed image tags:"
          echo "${{ steps.meta.outputs.tags }}"
