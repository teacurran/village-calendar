name: Deploy PR Preview

# One-time prerequisites (manual, outside this workflow):
#   1. Cloudflare DNS: add a wildcard CNAME *.calendar-pr.villagecompute.com
#      pointing to the cloudflared tunnel hostname (the same target used by
#      calendar-beta.villagecompute.com). Cloudflare terminates TLS at the
#      edge so no in-cluster cert is needed.
#   2. cloudflared tunnel ingress: route hostname *.calendar-pr.villagecompute.com
#      to http://<nginx-ingress-controller>.<namespace>.svc.cluster.local
#      (same backend used by other public hostnames).
#   3. The shared "calendar_beta" Postgres DB is reused across PRs. PR images
#      run with QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION=validate so they will
#      not migrate it. If you change schema in a PR, the deploy will fail
#      readiness — that is intentional; merge to beta first to migrate.

on:
  # Deploy after CI succeeds for a pull_request event
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
  # Tear down when PR closes (merged or not)
  pull_request:
    types: [closed]
  # Manual fallback
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to (re)deploy"
        required: true
      head_sha:
        description: "Commit SHA to deploy (full SHA)"
        required: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: village-calendar
  USE_WIREGUARD: ${{ secrets.USE_WIREGUARD || 'false' }}
  PR_DOMAIN: calendar-pr.villagecompute.com

jobs:
  context:
    name: Resolve PR context
    runs-on: ubuntu-latest
    # Skip workflow_run for non-PR triggers and for failed CI
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success')
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      action: ${{ steps.resolve.outputs.action }}
    steps:
      - id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            let prNumber, headSha, action;

            if (event === 'workflow_run') {
              const prs = context.payload.workflow_run.pull_requests || [];
              if (prs.length === 0) {
                core.info('CI run was not for a pull request — skipping.');
                core.setOutput('action', 'skip');
                return;
              }
              prNumber = prs[0].number;
              headSha = context.payload.workflow_run.head_sha;
              action = 'deploy';
            } else if (event === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              headSha = context.payload.pull_request.head.sha;
              action = 'cleanup';
            } else if (event === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number;
              headSha = context.payload.inputs.head_sha;
              action = 'deploy';
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('head_sha', headSha);
            core.setOutput('action', action);
            core.info(`Resolved: action=${action} pr=${prNumber} sha=${headSha}`);

  deploy:
    name: Deploy preview
    needs: [context]
    if: needs.context.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    # Per-PR mutex: a new push cancels an in-flight deploy for the same PR.
    # Distinct PRs still run in parallel — ANSIBLE_REMOTE_TMP below keeps
    # their ansible scratch dirs from colliding on the K3s host.
    concurrency:
      group: deploy-pr-${{ needs.context.outputs.pr_number }}
      cancel-in-progress: true
    env:
      PR_NUMBER: ${{ needs.context.outputs.pr_number }}
      HEAD_SHA: ${{ needs.context.outputs.head_sha }}
      DEPLOYMENT_NAMESPACE: calendar-pr-${{ needs.context.outputs.pr_number }}
      INGRESS_HOST: pr-${{ needs.context.outputs.pr_number }}.calendar-pr.villagecompute.com

    steps:
      - name: Checkout code at PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Setup WireGuard
        if: env.USE_WIREGUARD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools

          WG_ADDRESS=$(echo -n "${{ secrets.WIREGUARD_ADDRESS }}" | tr -d '[:space:]')
          WG_PRIVATE_KEY=$(echo -n "${{ secrets.WIREGUARD_PRIVATE_KEY }}" | tr -d '[:space:]')
          WG_PEER_PUBLIC_KEY=$(echo -n "${{ secrets.WIREGUARD_PEER_PUBLIC_KEY }}" | tr -d '[:space:]')
          WG_ENDPOINT=$(echo -n "${{ secrets.WIREGUARD_ENDPOINT }}" | tr -d '[:space:]')
          WG_ALLOWED_IPS=$(echo -n "${{ secrets.WIREGUARD_ALLOWED_IPS }}" | tr -d '[:space:]')

          sudo mkdir -p /etc/wireguard
          sudo tee /etc/wireguard/wg0.conf > /dev/null <<EOF
          [Interface]
          Address = ${WG_ADDRESS}
          PrivateKey = ${WG_PRIVATE_KEY}

          [Peer]
          PublicKey = ${WG_PEER_PUBLIC_KEY}
          Endpoint = ${WG_ENDPOINT}
          AllowedIPs = ${WG_ALLOWED_IPS}
          PersistentKeepalive = 25
          EOF
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          ping -c 3 10.50.0.20

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K3S_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<EOF
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
            ConnectionAttempts 3
          EOF

          if [ "${{ env.USE_WIREGUARD }}" == "true" ]; then
            echo "Host 10.50.0.20" >> ~/.ssh/config
            echo "  StrictHostKeyChecking no" >> ~/.ssh/config
            echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
          else
            echo "${{ secrets.K3S_HOST }} ssh-rsa ${{ secrets.K3S_HOST_KEY }}" >> ~/.ssh/known_hosts
          fi

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker

      - name: Deploy with Ansible
        env:
          # Per-namespace remote tmp avoids collisions when multiple PR deploys
          # land on the K3s host concurrently. Kept inside ~/.ansible/ so the
          # SSH user owns the tree and ansible's copy/sftp transfers behave
          # the same as with the default path.
          ANSIBLE_REMOTE_TMP: '~/.ansible/tmp-${{ env.DEPLOYMENT_NAMESPACE }}'
          REGISTRY_USER: ${{ secrets.DOCKER_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          # CI publishes images as sha-<full sha>
          IMAGE_TAG: sha-${{ env.HEAD_SHA }}
          K3S_HOST: ${{ env.USE_WIREGUARD == 'true' && '10.50.0.20' || secrets.K3S_HOST }}
          K3S_USER: ${{ secrets.K3S_USER }}
          # Reuse the beta database (per current design — no per-PR DB yet)
          DB_HOST: ${{ secrets.DB_HOST_BETA || secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT_BETA || secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME_BETA || 'calendar_beta' }}
          DB_USER: ${{ secrets.DB_USER_BETA || secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_BETA || secrets.DB_PASSWORD }}
          OBJECT_STORAGE_REGION: ${{ secrets.OBJECT_STORAGE_REGION }}
          OBJECT_STORAGE_BUCKET_NAME: ${{ secrets.OBJECT_STORAGE_BUCKET_NAME_BETA || secrets.OBJECT_STORAGE_BUCKET_NAME }}
          OBJECT_STORAGE_ENDPOINT_URL: ${{ secrets.OBJECT_STORAGE_ENDPOINT_URL }}
          OBJECT_STORAGE_CDN_URL: ${{ secrets.OBJECT_STORAGE_CDN_URL }}
          OBJECT_STORAGE_ACCESS_KEY: ${{ secrets.OBJECT_STORAGE_ACCESS_KEY }}
          OBJECT_STORAGE_SECRET_KEY: ${{ secrets.OBJECT_STORAGE_SECRET_KEY }}
          SESSION_ENCRYPTION_KEY: ${{ secrets.SESSION_ENCRYPTION_KEY_BETA || secrets.SESSION_ENCRYPTION_KEY }}
          # Google OAuth: reuse beta credentials. Redirects to pr-N.calendar-pr...
          # will be rejected by Google (wildcards not supported). Anonymous
          # checkout flow does not require a Google login, so this is fine.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          INGRESS_HOST: ${{ env.INGRESS_HOST }}
          DEPLOYMENT_NAMESPACE: ${{ env.DEPLOYMENT_NAMESPACE }}
        run: |
          cat > inventory.yml <<EOF
          all:
            hosts:
              k3s_cluster:
                ansible_host: ${K3S_HOST}
                ansible_user: ${K3S_USER}
                ansible_ssh_private_key_file: ~/.ssh/id_rsa
                ansible_python_interpreter: /usr/bin/python3
                ansible_ssh_common_args: '-o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4'
                ansible_ssh_retries: 3
          EOF

          ansible-playbook -v \
            -i inventory.yml \
            -e "k8s_namespace=${DEPLOYMENT_NAMESPACE}" \
            -e "replicas=1" \
            -e "quarkus_profile=beta" \
            ansible/deploy-calendar.yml

      - name: Wait for rollout
        env:
          K3S_HOST: ${{ env.USE_WIREGUARD == 'true' && '10.50.0.20' || secrets.K3S_HOST }}
          K3S_USER: ${{ secrets.K3S_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR ${K3S_USER}@${K3S_HOST} \
            "kubectl rollout status deployment/calendar -n ${DEPLOYMENT_NAMESPACE} --timeout=5m"

      - name: Smoke test (in-cluster health)
        env:
          K3S_HOST: ${{ env.USE_WIREGUARD == 'true' && '10.50.0.20' || secrets.K3S_HOST }}
          K3S_USER: ${{ secrets.K3S_USER }}
        run: |
          sleep 5
          HEALTH=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR ${K3S_USER}@${K3S_HOST} \
            "kubectl run smoke-${PR_NUMBER}-$(date +%s) --rm -i --restart=Never --image=curlimages/curl:latest -n ${DEPLOYMENT_NAMESPACE} -- \
            curl -s -o /dev/null -w '%{http_code}' http://calendar-service.${DEPLOYMENT_NAMESPACE}.svc.cluster.local/q/health/live" 2>&1)
          STATUS=$(echo "$HEALTH" | grep -oE '[0-9]{3}' | head -1)
          echo "In-cluster health: $STATUS"
          [ "$STATUS" = "200" ] || { echo "$HEALTH"; exit 1; }

      - name: Disconnect WireGuard
        if: always() && env.USE_WIREGUARD == 'true'
        run: sudo wg-quick down wg0 || true

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${process.env.INGRESS_HOST}`;
            const sha = process.env.HEAD_SHA.substring(0, 7);
            const body = `Deployed PR preview at ${url} (sha ${sha})`;

            // Update existing comment if present, else create
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.PR_NUMBER }},
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('Deployed PR preview at'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ env.PR_NUMBER }},
                body,
              });
            }

  e2e:
    name: Playwright (anonymous checkout)
    needs: [context, deploy]
    if: needs.context.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://pr-${{ needs.context.outputs.pr_number }}.calendar-pr.villagecompute.com
      CI: "true"

    steps:
      - name: Checkout code at PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/main/webui/package-lock.json

      # Drop in `e2e-tests/tests/anonymous-checkout.spec.ts` to enable this job.
      # While the file is absent the job exits 0 so PR previews still pass.
      - name: Check for anonymous-checkout spec
        id: spec
        run: |
          if [ -f e2e-tests/tests/anonymous-checkout.spec.ts ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No e2e-tests/tests/anonymous-checkout.spec.ts yet — skipping Playwright run."
          fi

      - name: Install Playwright + browser
        if: steps.spec.outputs.exists == 'true'
        working-directory: src/main/webui
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright against preview URL
        if: steps.spec.outputs.exists == 'true'
        working-directory: src/main/webui
        run: |
          npx playwright test \
            --config=../../../e2e-tests/playwright.config.ts \
            anonymous-checkout.spec.ts \
            --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-pr-${{ needs.context.outputs.pr_number }}
          path: e2e-tests/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  cleanup:
    name: Tear down preview
    needs: [context]
    if: needs.context.outputs.action == 'cleanup'
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_NAMESPACE: calendar-pr-${{ needs.context.outputs.pr_number }}
      PR_NUMBER: ${{ needs.context.outputs.pr_number }}

    steps:
      - name: Checkout default branch
        # PR head may have been deleted; cleanup playbook lives on main.
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup WireGuard
        if: env.USE_WIREGUARD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools

          WG_ADDRESS=$(echo -n "${{ secrets.WIREGUARD_ADDRESS }}" | tr -d '[:space:]')
          WG_PRIVATE_KEY=$(echo -n "${{ secrets.WIREGUARD_PRIVATE_KEY }}" | tr -d '[:space:]')
          WG_PEER_PUBLIC_KEY=$(echo -n "${{ secrets.WIREGUARD_PEER_PUBLIC_KEY }}" | tr -d '[:space:]')
          WG_ENDPOINT=$(echo -n "${{ secrets.WIREGUARD_ENDPOINT }}" | tr -d '[:space:]')
          WG_ALLOWED_IPS=$(echo -n "${{ secrets.WIREGUARD_ALLOWED_IPS }}" | tr -d '[:space:]')

          sudo mkdir -p /etc/wireguard
          sudo tee /etc/wireguard/wg0.conf > /dev/null <<EOF
          [Interface]
          Address = ${WG_ADDRESS}
          PrivateKey = ${WG_PRIVATE_KEY}

          [Peer]
          PublicKey = ${WG_PEER_PUBLIC_KEY}
          Endpoint = ${WG_ENDPOINT}
          AllowedIPs = ${WG_ALLOWED_IPS}
          PersistentKeepalive = 25
          EOF
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K3S_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<EOF
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
            ConnectionAttempts 3
          EOF
          if [ "${{ env.USE_WIREGUARD }}" == "true" ]; then
            echo "Host 10.50.0.20" >> ~/.ssh/config
            echo "  StrictHostKeyChecking no" >> ~/.ssh/config
            echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
          else
            echo "${{ secrets.K3S_HOST }} ssh-rsa ${{ secrets.K3S_HOST_KEY }}" >> ~/.ssh/known_hosts
          fi

      - name: Run cleanup playbook
        env:
          K3S_HOST: ${{ env.USE_WIREGUARD == 'true' && '10.50.0.20' || secrets.K3S_HOST }}
          K3S_USER: ${{ secrets.K3S_USER }}
        run: |
          python -m pip install --upgrade pip
          pip install ansible

          cat > inventory.yml <<EOF
          all:
            hosts:
              k3s_cluster:
                ansible_host: ${K3S_HOST}
                ansible_user: ${K3S_USER}
                ansible_ssh_private_key_file: ~/.ssh/id_rsa
                ansible_python_interpreter: /usr/bin/python3
                ansible_ssh_common_args: '-o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4'
                ansible_ssh_retries: 3
          EOF

          ansible-playbook -v -i inventory.yml ansible/cleanup-calendar.yml

      - name: Disconnect WireGuard
        if: always() && env.USE_WIREGUARD == 'true'
        run: sudo wg-quick down wg0 || true

      - name: Comment teardown on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.PR_NUMBER }},
              body: `Tore down PR preview (namespace ${process.env.DEPLOYMENT_NAMESPACE}).`,
            });
